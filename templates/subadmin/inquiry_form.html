{% extends "subadmin/sub_admin_dashboard.html" %}
{% load static %}

{% block title %}Customer Inquiry Form{% endblock %}

{% block content %}
<div class="app-main">
    <div class="app-main__outer">
        <div class="app-main__inner">
            
            <div class="app-page-title">
                <div class="page-title-wrapper">
                    <div class="page-title-heading">
                        <div class="page-title-icon">
                            <i class="pe-7s-note2 icon-gradient bg-mean-fruit"></i>
                        </div>
                        <div>
                            Customer Inquiry Form
                            <div class="page-title-subheading">Register a new customer request for nursing services.</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="main-card mb-3 card">
                <div class="card-body">
                    <h5 class="card-title">New Service Request</h5>
                    
                    <form action="" method="POST">
                        {% csrf_token %}

                        <div class="row">
                            
                            <div class="col-md-6 mb-3">
                                <label for="id_customer_name">Customer Name</label>
                                <input type="text" id="id_customer_name" name="customer_name" class="form-control" placeholder="Enter Customer Full Name" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="id_phone">Phone Number</label>
                                <input type="text" id="id_phone" name="phone" class="form-control" placeholder="Enter Contact Number" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="id_nurse_type">Preferred Nurse Type</label>
                                <select id="id_nurse_type" name="nurse_type" class="form-control" required>
                                    <option value="" disabled selected>-- Select Gender Preference --</option>
                                    <option value="Male">Male Nurse</option>
                                    <option value="Female">Female Nurse</option>
                                    <option value="No Preference">No Preference</option>
                                </select>
                            </div>

                            <div class="col-md-12 mb-4">
                                <label for="id_address">Address</label>
                                <textarea id="id_address" name="address" class="form-control" rows="3" placeholder="Enter Full Service Address" required></textarea>
                            </div>

                            <!-- NEW FIELD ADDED -->
                            <div class="col-md-12 mb-4">
                                <label for="id_remark">Remark</label>
                                <textarea id="id_remark" name="remark" class="form-control" rows="2" placeholder="Any additional details"></textarea>
                            </div>

                        </div>
                        
                        <div class="mt-3 pt-3 border-top">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-paper-plane"></i> Submit Inquiry
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
{% endblock content %}
