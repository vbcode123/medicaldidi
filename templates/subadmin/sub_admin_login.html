<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Didi - Sub Admin Login</title>
    <style>
        /* Pink Theme Variables */
        :root {
            --primary-color: #E75480; /* Pink for action */
            --accent-color: #D44D73; /* Darker Pink for hover/focus */
            --background-color: #FFE6E6; /* Light Pink */
            --card-shadow: 0 8px 25px rgba(231, 84, 128, 0.15); /* Soft pink shadow */
            --error-color: #c82333; /* Standard Red */
        }

        /* 1. Basic Styling and Centering */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', Arial, sans-serif;
        }

        body {
            background-color: var(--background-color); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding-top: 70px; /* Space for fixed header */
        }

        /* 2. Header Bar */
        .header-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #FFE6E6; /* Light Pink */
            padding: 10px 25px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
            z-index: 1000;
            text-align: right;
        }
        
        .home-button {
            text-decoration: none;
            background-color: var(--primary-color);
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 6px rgba(231, 84, 128, 0.2);
        }

        .home-button:hover {
            background-color: var(--accent-color);
            transform: translateY(-1px);
        }

        /* 3. Login Container Styling */
        .login-container {
            width: 90%;
            max-width: 420px;
            padding: 30px;
            background-color: white;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            text-align: center;
            margin-bottom: 30px;
        }

        /* Sub-Administrator Login font style changed */
        .login-container h2 {
            color: var(--primary-color);
            margin-bottom: 25px;
            font-size: 1.8em;
            font-weight: 700;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 10px;
            font-family: 'Arial Black', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* 4. Form Styling (Input fields) */
        form {
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #444;
            font-size: 1em;
        }

        input[type="text"], 
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid #dcdcdc;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus, 
        input[type="password"]:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 8px rgba(231, 84, 128, 0.3);
        }

        /* Error Message Styling */
        .error-message {
            color: var(--error-color);
            background-color: #FFE6E6; /* Light Pink background */
            border: 1px solid var(--primary-color);
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.95em;
            font-weight: 500;
        }

        /* Login Button Styling */
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s;
        }

        button[type="submit"]:hover {
            background-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(231, 84, 128, 0.3);
        }
        
        button[type="submit"]:active {
            transform: translateY(0);
        }

        /* 5. Mobile-Specific Media Query */
        @media (max-width: 480px) {
            body {
                padding-top: 60px;
                background-color: #FFE6E6;
            }

            .login-container {
                width: 100%;
                padding: 20px;
                border-radius: 0;
                box-shadow: none;
            }

            .home-button {
                padding: 8px 12px;
                font-size: 0.9em;
                border-radius: 6px;
                background-color: var(--primary-color);
            }
            
            .home-button:hover {
                background-color: var(--accent-color);
            }
            
            .login-container h2 {
                font-size: 1.5em;
                letter-spacing: 0.5px;
            }
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <a href="/" class="home-button">🏠 Home</a> 
    </div>

    {% load static %}

    <div class="login-container" style="text-align:center;">
        <!-- Logo Image -->
        <img src="{% static 'image/home.jpg' %}" 
            alt="Sub Admin Logo" 
            style="height:80px; width:auto; margin-bottom:15px;">

        <!-- Heading with updated font style -->
        <h2>📱 Sub-Administrator Login</h2>
        
        {% if error %}
        <!-- Updated error icon -->
        <p class="error-message">🛑 {{ error }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <label for="id_phone">📱 Phone Number:</label>
            <input type="text" id="id_phone" name="phone" required placeholder="Enter registered phone number">
            
            <label for="id_password">🔒 Password:</label>
            <input type="password" id="id_password" name="password" required placeholder="Enter password">

            <button type="submit">LOGIN</button>
        </form>
    </div>
</body>
</html>
